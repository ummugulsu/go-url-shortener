version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: urlshortener-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MyNewPass123
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: urlshortener-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: urlshortener-app
    ports:
      - "8080:8080"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MyNewPass123
      POSTGRES_DB: urlshortener
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
